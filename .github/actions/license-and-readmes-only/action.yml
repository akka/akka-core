name: License and readmes only
description: >-
  Detects whether the only files changed in this PR or push are the top-level
  LICENSE, README.md, or CONTRIBUTING.md. Sets license_and_readmes_only="true"
  when that is the case, otherwise "false". Requires the repository to be
  checked out with sufficient history to diff the base and head shas
  (typically fetch-depth: 0).
outputs:
  license_and_readmes_only:
    description: '"true" if only LICENSE/README.md/CONTRIBUTING.md changed'
    value: ${{ steps.filter.outputs.license_and_readmes_only }}
runs:
  using: composite
  steps:
    - name: Detect license/readmes-only changes
      id: filter
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        set -euo pipefail
        if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          echo "No usable base sha; assuming non license-and-readmes-only"
          echo "license_and_readmes_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
        echo "Changed files between $BASE_SHA and $HEAD_SHA:"
        echo "$changed"
        other=$(echo "$changed" | grep -vE '^(LICENSE|README\.md|CONTRIBUTING\.md)$' || true)
        if [ -n "$changed" ] && [ -z "$other" ]; then
          echo "Only LICENSE/README/CONTRIBUTING changed"
          echo "license_and_readmes_only=true" >> "$GITHUB_OUTPUT"
        else
          echo "license_and_readmes_only=false" >> "$GITHUB_OUTPUT"
        fi
